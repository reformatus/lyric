name: On Commit or PR

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  analyze:
    name: Analyze code
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - run: flutter --version

      - name: Install dependencies
        run: flutter pub get

      - name: Run Build Runner
        run: dart run build_runner build

      - name: Upload generated files
        uses: actions/upload-artifact@v4
        with:
          name: generated-files
          path: |
            lib/**/*.g.dart
            lib/**/*.steps.dart
            test/**/*.g.dart
            test/**/*.steps.dart
            test/**/*.types.temp.dart
          if-no-files-found: error

  test:
    name: Run tests
    runs-on: ubuntu-latest
    needs: analyze
    steps:
      - uses: actions/checkout@v4

      - name: Install SQLite
        run: sudo apt-get update && sudo apt-get install -y libsqlite3-dev

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - run: flutter --version

      - name: Install dependencies
        run: flutter pub get

      - name: Download generated files
        uses: actions/download-artifact@v4
        with:
          name: generated-files
          path: .

      - name: Run tests
        run: |
          flutter test \
            test/harness \
            test/services \
            test/data \
            test/drift